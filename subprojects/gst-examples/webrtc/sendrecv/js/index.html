<!DOCTYPE html>
<!--
  vim: set sts=2 sw=2 et :


  Demo Javascript app for negotiating and streaming a sendrecv webrtc stream
  with a GStreamer app. Runs only in passive mode, i.e., responds to offers
  with answers, exchanges ICE candidates, and streams.

  Author: Nirbheek Chauhan <nirbheek@centricular.com>
-->
<html>
  <head>
    <meta charset="utf-8"/>
    <style>
      .error { color: red; }
    </style>
    <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
    <script src="webrtc.js"></script>
    <script>
      window.onload = websocketServerConnect;
      window.addEventListener('DOMContentLoaded', () => {
        const fragment = window.location.hash.substring(1); // strip the '#'
        if (!fragment) return;

        const pairs = fragment.split(',');
        pairs.forEach(pair => {
          const [id, val] = pair.split('=');
          if (id === 'remote-offerer') {
            const el = document.getElementById('remote-offerer');
            el.checked = (val == '1');
            el.dispatchEvent(new Event('change'));
          } else if (id === 'data-channel') {
            const el = document.getElementById('data-channel');
            el.checked = (val == '1');
            el.dispatchEvent(new Event('change'));
          } else if (id === 'peer-id') {
            document.getElementById('peer-connect').value = val;
          } else if (id === 'connect' && val === '1') {
            window.setTimeout(onConnectClicked, 2000);
          }
        });
      });
    </script>
  </head>

  <body>
    <div id="incoming"></div>
    <div id="preview" style="position: relative; display: inline-block;">
      <div style="position: absolute; bottom: 0; left: 0; padding: 0.5rem 1rem;
        background: rgba(0,0,0,0.4); color: white; font-size: 2rem;
        pointer-events: none;" hidden>
      Preview
      </div>
    </div>
    <div>Status: <span id="status">unknown</span></div>
    <div><textarea id="text" cols=40 rows=4></textarea></div>
    <br/>
    <div>
      <label for="peer-connect">Enter peer id</label>
      <input id="peer-connect" type="text" name="text" onkeypress="onTextKeyPress();" required>
      <input id="peer-connect-button" onclick="onConnectClicked();" type="button" value="Connect">
      <!-- Request the peer to send the offer by sending the OFFER_REQUEST message.
        Same as the --remote-offerer flag in the sendrecv C example -->
      <input id="remote-offerer" type="checkbox" autocomplete="off" onchange="onRemoteOffererChanged();"><span>Remote offerer</span>
      <input id="data-channel" type="checkbox" autocomplete="off" checked><label id="data-channel-label" for="data-channel">Data channel</label>
    </div>

    <div>Our id is <b id="peer-id">unknown</b></div>
    <br/>
    <div>
      <div>getUserMedia constraints being used:</div>
      <div><textarea id="constraints" cols=40 rows=4></textarea></div>
    </div>
  </body>
</html>
